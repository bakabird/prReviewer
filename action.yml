name: 'PR Copilot AI'
description: 'LLM-powered PR review that posts structured, actionable inline comments on your pull requests'
author: 'Noah Lund Syrdal'

branding:
  icon: 'eye'
  color: 'blue'

inputs:
  api_key:
    description: 'API key for the LLM provider (OpenAI, etc.)'
    required: true
  github_token:
    description: 'GitHub token for posting review comments'
    required: false
    default: ${{ github.token }}
  model:
    description: 'Single LLM model identifier, used when models is empty'
    required: false
    default: 'gpt-4.1-mini'
  models:
    description: 'Ordered comma-separated LLM model identifiers. Takes precedence over model when set.'
    required: false
    default: ''
  mode:
    description: 'Review mode: single (faster) or multi (deeper, multi-pass)'
    required: false
    default: 'multi'
  base_url:
    description: 'OpenAI-compatible API base URL'
    required: false
    default: 'https://api.openai.com/v1'
  max_lines:
    description: 'Max diff lines per review chunk'
    required: false
    default: '1200'
  timeout_seconds:
    description: 'Per-request timeout in seconds for provider chat completions'
    required: false
    default: '120'
  max_retries:
    description: 'Max retry attempts for transient provider request failures'
    required: false
    default: '10'
  max_tokens:
    description: 'Optional cap for completion tokens sent to the provider'
    required: false
    default: ''
  exclude:
    description: 'Glob patterns to exclude from review (comma-separated, e.g. "*.lock,docs/**")'
    required: false
    default: ''
  post_comments:
    description: 'Whether to post inline comments on the PR'
    required: false
    default: 'true'
  trigger:
    description: 'Review trigger mode: bulk_commit or comment'
    required: false
    default: 'bulk_commit'
  reviewer_bot_name:
    description: 'Bot command name for comment-triggered reviews, without the leading @'
    required: false
    default: 'reviewer001'
  allowed_author_associations:
    description: 'Comma-separated GitHub author associations allowed to trigger comment reviews'
    required: false
    default: 'OWNER,MEMBER,COLLABORATOR'

runs:
  using: 'composite'
  steps:
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Install pr-reviewer
      shell: bash
      working-directory: ${{ github.action_path }}
      run: pip install .

    - name: Run PR review
      shell: bash
      env:
        PR_REVIEWER_API_KEY: ${{ inputs.api_key }}
        PR_REVIEWER_BASE_URL: ${{ inputs.base_url }}
        PR_REVIEWER_TIMEOUT_SECONDS: ${{ inputs.timeout_seconds }}
        PR_REVIEWER_MAX_RETRIES: ${{ inputs.max_retries }}
        PR_REVIEWER_MAX_TOKENS: ${{ inputs.max_tokens }}
        GITHUB_TOKEN: ${{ inputs.github_token }}
        INPUT_MODEL: ${{ inputs.model }}
        INPUT_MODELS: ${{ inputs.models }}
        INPUT_MODE: ${{ inputs.mode }}
        INPUT_MAX_LINES: ${{ inputs.max_lines }}
        INPUT_EXCLUDE: ${{ inputs.exclude }}
        INPUT_POST_COMMENTS: ${{ inputs.post_comments }}
        INPUT_TRIGGER: ${{ inputs.trigger }}
        INPUT_REVIEWER_BOT_NAME: ${{ inputs.reviewer_bot_name }}
        INPUT_ALLOWED_AUTHOR_ASSOCIATIONS: ${{ inputs.allowed_author_associations }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        REPO: ${{ github.repository }}
      run: python "${{ github.action_path }}/action/run_review.py"
