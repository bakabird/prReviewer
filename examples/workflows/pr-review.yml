name: PR Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: bakabird/prReviewer@v1.1
        with:
          api_key: ${{ secrets.OPENAI_API_KEY }}
          github_token: ${{ github.token }}
          trigger: pull_request
          mode: multi
          max_lines: '1200'
          exclude: '*.lock,dist/**,node_modules/**'
