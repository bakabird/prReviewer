name: AI PR Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

concurrency:
  group: ai-pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - uses: bakabird/prReviewer@main
        with:
          api_key: ${{ secrets.LLM_API_KEY }}
          github_token: ${{ github.token }}
          trigger: bulk_commit
          model: ${{ secrets.LLM_MODEL }}
          # Optional: comma-separated models run sequentially and override model when set.
          # models: ${{ secrets.LLM_MODELS }}
          base_url: ${{ secrets.LLM_BASE_URL }}
          mode: multi
          max_lines: "1200"
          exclude: "*.lock,dist/**,node_modules/**"
